services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # ports:  # NOT exposed to public internet — only accessible within Docker network
    #   - "5432:5432"
    volumes:
      - poetry_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-google/gemini-2.0-flash}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_CSE_ID: ${GOOGLE_CSE_ID:-}
    depends_on:
      db:
        condition: service_healthy
    # ports:  # NOT exposed to public internet — bot accesses via Docker network
    #   - "8000:8000"

  bot:
    build:
      context: ./bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://backend:8000}
    depends_on:
      - backend

volumes:
  poetry_pgdata:
