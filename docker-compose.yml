services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: poetry
      POSTGRES_PASSWORD: poetry
      POSTGRES_DB: poetry
    ports:
      - "5432:5432"
    volumes:
      - poetry_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poetry"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://poetry:poetry@db:5432/poetry}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-google/gemini-2.0-flash}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  bot:
    build:
      context: ./bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://backend:8000}
    depends_on:
      - backend

volumes:
  poetry_pgdata:
