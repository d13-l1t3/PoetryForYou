name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov ruff bandit mypy

      - name: Lint with ruff
        run: ruff check backend/ --output-format=github || true
        continue-on-error: true

      - name: Security scan with bandit
        run: bandit -r backend/app/ -ll --format txt || true

      - name: Type check with mypy
        run: mypy backend/app/main.py backend/app/schemas.py --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite:///./test_poetry.db"
        run: |
          cd backend
          pytest tests/ --cov=app --cov-report=term-missing -v
